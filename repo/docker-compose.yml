services:
  mysql:
    image: mysql:8.0
    container_name: fieldops_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: fieldops_root_pass
      MYSQL_DATABASE: fieldops
      MYSQL_USER: fieldops_user
      MYSQL_PASSWORD: fieldops_pass
    ports:
      # Host port is overridable via MYSQL_HOST_PORT. Defaults to 3307 (not
      # 3306) so `docker compose up` works even when a local MySQL/MariaDB
      # Windows service or another Docker container is already bound to
      # 3306 on the host. In-cluster traffic (backend → mysql) uses the
      # service name `mysql` on port 3306 regardless of this mapping.
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/database/seeds/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    # Targets the mysql:8.0 image pinned above. --default-authentication-plugin
    # is valid on MySQL 8.0 and is needed so PHP's default mysqli/PDO drivers
    # (which still expect mysql_native_password) can authenticate without a
    # manual ALTER USER. NOTE: mysql_native_password was REMOVED in MySQL 8.4 —
    # if the image tag is bumped to 8.4+, replace this with
    # `--mysql-native-password=ON` (if supported) or drop the flag entirely
    # and switch backend credentials to caching_sha2_password.
    # innodb_buffer_pool_size=128M + performance_schema=OFF keeps MySQL's
    # resident set under ~300MB on first boot. The default is ~1.5GB, which
    # on Docker Desktop with a 4-8GB shared VM gets SIGKILL-ed (exit 137)
    # mid-init when other dev stacks are running on the same daemon, and
    # run_tests.sh then dies in the `up --wait` phase before any test runs.
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=128M --performance-schema=OFF --innodb-log-buffer-size=8M
    mem_limit: 512m
    healthcheck:
      # Ping over TCP (-h 127.0.0.1 with --protocol=TCP) rather than a
      # local UNIX socket, so "healthy" genuinely means "accepting
      # external TCP connections from peer containers". The default
      # socket-based ping went green while 3306 was still refusing TCP,
      # causing every other service to hit "Connection refused" on its
      # first query.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=TCP", "-u", "root", "-pfieldops_root_pass"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fieldops_backend
    restart: unless-stopped
    environment:
      APP_NAME: FieldOps Service Suite
      # This compose file is a LOCAL DEVELOPMENT artifact — it ships
      # hardcoded DB credentials and a well-known dev ENCRYPTION_KEY
      # below. APP_ENV=development reflects that reality. Real deployments
      # must run APP_ENV=production against a deploy-time secret manager
      # (k8s Secret, Vault, etc.), not this file. See README →
      # "Encryption key provisioning" for the production checklist.
      APP_ENV: development
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      API_PREFIX: /api/v1
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fieldops
      DB_USER: fieldops_user
      DB_PASSWORD: fieldops_pass
      SESSION_TTL_MINUTES: "480"
      LOCKOUT_MAX_ATTEMPTS: "5"
      LOCKOUT_DURATION_MINUTES: "15"
      PASSWORD_MIN_LENGTH: "12"
      DEFAULT_TAX_RATE: "0.08"
      AUDIT_LOG_RETENTION_YEARS: "7"
      DISCREPANCY_THRESHOLD_USD: "1.00"
      DEFAULT_TIME_BUCKET_MINUTES: "1"
      LATE_ARRIVAL_TOLERANCE_MINUTES: "5"
      ENCRYPTION_ACTIVE_KEY_VERSION: "1"
      ENCRYPTION_KEYS_FILE_PATH: /app/storage/keys/encryption.key
      # !!! DEVELOPMENT PLACEHOLDER — NEVER USE IN PRODUCTION !!!
      # This value is public, deterministic, and visible in version
      # control. It lets `docker-compose up` succeed on a fresh checkout
      # without any manual key provisioning. It is NOT a secret.
      # BEFORE any non-local deployment:
      #   (a) Generate a fresh 32-byte random key (see README).
      #   (b) Inject it through a real secret manager (k8s Secret,
      #       Vault, SOPS, etc.) — never inline in a committed file.
      #   (c) OR remove this line entirely and mount an
      #       ENCRYPTION_KEYS_FILE_PATH key file instead.
      # Running with this value against real data would leak every
      # field-level-encrypted row to anyone with the repo.
      ENCRYPTION_KEY: '{"1":"ZGV2LW9ubHktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXNfXw=="}'
      CSV_EXPORT_ENCODING: UTF-8
      ENABLE_EXPERIMENTS: "true"
      ENABLE_TLS: "false"
    ports:
      - "8000:8000"
    volumes:
      # Persist writable state only. Do NOT bind-mount ./backend over /app:
      # the image's `composer install` produces /app/vendor, and a host
      # bind mount would replace /app with the host directory (which has
      # no vendor/), causing `require /app/vendor/autoload.php` to fail on
      # every restart. To iterate on PHP source live, rebuild with
      # `docker compose up --build` (or add a dev-profile override that
      # bind-mounts individual source dirs but leaves /app/vendor alone).
      - backend_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time. Relative path so nginx
        # reverse-proxies `/api/` to the backend container — override here
        # if the frontend ever serves a non-proxied absolute URL.
        API_BASE_URL: /api/v1
    container_name: fieldops_frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: fieldops_test_backend
    environment:
      APP_NAME: FieldOps Service Suite
      APP_ENV: testing
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      API_PREFIX: /api/v1
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: fieldops
      DB_USER: fieldops_user
      DB_PASSWORD: fieldops_pass
      SESSION_TTL_MINUTES: "480"
      LOCKOUT_MAX_ATTEMPTS: "5"
      LOCKOUT_DURATION_MINUTES: "15"
      PASSWORD_MIN_LENGTH: "12"
      DEFAULT_TAX_RATE: "0.08"
      AUDIT_LOG_RETENTION_YEARS: "7"
      DISCREPANCY_THRESHOLD_USD: "1.00"
      DEFAULT_TIME_BUCKET_MINUTES: "1"
      LATE_ARRIVAL_TOLERANCE_MINUTES: "5"
      ENCRYPTION_ACTIVE_KEY_VERSION: "1"
      ENCRYPTION_KEYS_FILE_PATH: /app/storage/keys/encryption.key
      ENCRYPTION_KEY: '{"1":"ZGV2LW9ubHktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXNfXw=="}'
      CSV_EXPORT_ENCODING: UTF-8
      ENABLE_EXPERIMENTS: "true"
      ENABLE_TLS: "false"
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - test

  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    container_name: fieldops_test_frontend
    environment:
      API_BASE_URL: http://backend:8000/api/v1
    profiles:
      - test

  test-e2e:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    container_name: fieldops_test_e2e
    environment:
      BACKEND_URL: http://backend:8000
      API_BASE_URL: http://backend:8000/api/v1
      FRONTEND_URL: http://frontend:80
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    profiles:
      - e2e

volumes:
  mysql_data:
  backend_storage:
