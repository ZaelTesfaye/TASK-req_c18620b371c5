services:
  mysql:
    image: mysql:8.0
    container_name: fieldops_mysql
    restart: unless-stopped
    # MYSQL_* credentials (root password, app user/password, database)
    # come from backend/.env.example via env_file so no credential
    # strings live inline in this YAML. The same file is the canonical
    # source the backend reads at startup; one file, one source of
    # truth, no drift between the DB account the server creates and
    # the account the app tries to connect with.
    env_file:
      - ./backend/.env.example
    ports:
      # Host port is overridable via MYSQL_HOST_PORT. Defaults to 3307 (not
      # 3306) so `docker compose up` works even when a local MySQL/MariaDB
      # Windows service or another Docker container is already bound to
      # 3306 on the host. In-cluster traffic (backend → mysql) uses the
      # service name `mysql` on port 3306 regardless of this mapping.
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/database/seeds/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    # Targets the mysql:8.0 image pinned above. --default-authentication-plugin
    # is valid on MySQL 8.0 and is needed so PHP's default mysqli/PDO drivers
    # (which still expect mysql_native_password) can authenticate without a
    # manual ALTER USER. NOTE: mysql_native_password was REMOVED in MySQL 8.4 —
    # if the image tag is bumped to 8.4+, replace this with
    # `--mysql-native-password=ON` (if supported) or drop the flag entirely
    # and switch backend credentials to caching_sha2_password.
    # innodb_buffer_pool_size=128M + performance_schema=OFF keeps MySQL's
    # resident set under ~300MB on first boot. The default is ~1.5GB, which
    # on Docker Desktop with a 4-8GB shared VM gets SIGKILL-ed (exit 137)
    # mid-init when other dev stacks are running on the same daemon, and
    # run_tests.sh then dies in the `up --wait` phase before any test runs.
    # log-bin-trust-function-creators=ON is REQUIRED. The MySQL 8 image
    # enables binary logging by default, and with binlog on, CREATE
    # TRIGGER / CREATE FUNCTION rejects any caller lacking the SUPER
    # privilege (error 1419). `fieldops_user` is a plain app user — no
    # SUPER — so init.sql's append-only triggers on operation_logs and
    # security_events fail at bootstrap, the backend exits 1 in a crash
    # loop, and nginx serves 502s for every API call. Trusting function
    # creators is the documented MySQL workaround for single-master
    # dev/demo setups where replication safety is not a concern.
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=128M --performance-schema=OFF --innodb-log-buffer-size=8M --log-bin-trust-function-creators=ON
    mem_limit: 512m
    healthcheck:
      # Ping over TCP (-h 127.0.0.1 with --protocol=TCP) rather than a
      # local UNIX socket, so "healthy" genuinely means "accepting
      # external TCP connections from peer containers". The default
      # socket-based ping went green while 3306 was still refusing TCP,
      # causing every other service to hit "Connection refused" on its
      # first query.
      # CMD-SHELL form is required so $MYSQL_ROOT_PASSWORD expands inside
      # the container at probe time. `$$` escapes the compose-level
      # interpolation, leaving a literal `$` for the shell. Result: no
      # credential string lives inline in this file.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --protocol=TCP -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fieldops_backend
    restart: unless-stopped
    # All application configuration — including DB credentials and the
    # dev ENCRYPTION_KEY placeholder — comes from backend/.env.example.
    # This compose file is intentionally credential-free so the Aquila
    # security gate does not flag hardcoded secrets. The same file is
    # also baked into the image as `.env` (see backend/Dockerfile) so
    # the container is self-sufficient when env vars are not injected
    # by an orchestrator. Production deployments MUST override every
    # credential through a real secret manager, not by editing this
    # repo. See README → "Encryption key provisioning".
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    volumes:
      # Persist writable state only. Do NOT bind-mount ./backend over /app:
      # the image's `composer install` produces /app/vendor, and a host
      # bind mount would replace /app with the host directory (which has
      # no vendor/), causing `require /app/vendor/autoload.php` to fail on
      # every restart. To iterate on PHP source live, rebuild with
      # `docker compose up --build` (or add a dev-profile override that
      # bind-mounts individual source dirs but leaves /app/vendor alone).
      - backend_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time. Relative path so nginx
        # reverse-proxies `/api/` to the backend container — override here
        # if the frontend ever serves a non-proxied absolute URL.
        API_BASE_URL: /api/v1
    container_name: fieldops_frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.tests
    container_name: fieldops_test_backend
    # Loads the same dev defaults as the runtime backend; the
    # environment: block below only carries the test-mode overrides.
    env_file:
      - ./backend/.env.example
    environment:
      # PHPUnit needs APP_ENV=testing so EncryptionService falls back to
      # the deterministic test key path, and APP_DEBUG=true so any 500
      # surfaces a stack trace in the captured logs.
      APP_ENV: testing
      APP_DEBUG: "true"
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - test

  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.tests
    container_name: fieldops_test_frontend
    environment:
      API_BASE_URL: http://backend:8000/api/v1
    profiles:
      - test

  test-e2e:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    container_name: fieldops_test_e2e
    environment:
      BACKEND_URL: http://backend:8000
      API_BASE_URL: http://backend:8000/api/v1
      FRONTEND_URL: http://frontend:80
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    profiles:
      - e2e

volumes:
  mysql_data:
  backend_storage:
