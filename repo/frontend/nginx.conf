server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS (127.0.0.11) and defer upstream resolution
    # to request time via a variable. Without this, nginx resolves
    # `backend` once at startup — if the backend container is momentarily
    # down, unresolvable, or still booting, nginx exits with
    # "host not found in upstream 'backend'" and the whole frontend
    # container dies. With a variable in proxy_pass, each request
    # re-resolves, and the 30s TTL keeps DNS lookups cheap.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend_upstream "backend:8000";
        # IMPORTANT: do NOT include a URI part after the upstream (no
        # trailing `/api/` on the proxy_pass target). nginx's
        # "replace-matched-location-prefix-with-URI" rewrite only fires
        # when the upstream is a literal hostname. With a variable
        # upstream (required here so the frontend container survives a
        # transient `backend` DNS miss at startup), nginx treats the URI
        # part as opaque and forwards the LITERAL `/api/` to the
        # backend, stripping `v1/auth/bootstrap/stores` and similar
        # tails. Result: every API call hit ThinkPHP as `GET /api/` and
        # 404'd. Omitting the URI part — combined with the explicit
        # `$request_uri` below — preserves the full original path.
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
